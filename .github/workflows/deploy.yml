name: Deploy to VPS

# Push-to-deploy: every push to main (or a manual run) SSHes into the VPS and
# rebuilds the Docker stack. Requires repo secrets (see EMAIL_AND_DEPLOY_SETUP.md):
#   VPS_HOST, VPS_USER, VPS_SSH_KEY   (required)
#   VPS_PORT     (optional, default 22)
#   VPS_APP_DIR  (optional, default /opt/simple-asana)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secrets are configured
        id: check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_SSH_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Deploy skipped — add VPS_HOST, VPS_USER, VPS_SSH_KEY (and optionally VPS_PORT, VPS_APP_DIR) in repo Settings → Secrets and variables → Actions."
          fi

      - name: Deploy over SSH
        if: steps.check.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.VPS_APP_DIR || '/opt/simple-asana' }}"
            git pull origin main
            docker-compose up -d --build
            docker image prune -f
